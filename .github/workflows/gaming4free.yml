name: gaming4free renew (WARP + Python)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 每小时运行一次，增加“抽卡”机会

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

     # =========================
      # 🟡 1️⃣ 启动 WARP 全局动态 IP
      # =========================
      - name: Setup WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          # 🌟 修复：删除了 mode: client，直接使用默认的全局接管模式

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python packages
        run: |
          pip install seleniumbase SpeechRecognition pydub
          sbase install chromium

      # =========================
      # 🟡 2️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          # 🌟 修复：去掉 -x socks5 参数，直接测全局 IP
          echo "🌍 当前全局出口 IP (应为 Cloudflare WARP IP):"
          curl -s https://api.ipify.org
          echo ""
          xvfb-run -a python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**

name: gaming4free renew (WARP)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 🕕 每天18:00（UTC）

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      # =========================
      # 🟡 0️⃣ 拉取当前仓库代码
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 🟡 1️⃣ Node环境
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 🟡 2️⃣ WARP (解决 IP 限制)
      # =========================
      - name: 创建WARP网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 3️⃣ 系统依赖（音频/虚拟屏幕）
      # =========================
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full \
            pulseaudio alsa-utils ffmpeg

          pulseaudio --start --exit-idle-time=-1 || true

          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true

          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      # =========================
      # 🟡 4️⃣ 安装 Playwright
      # =========================
      - name: Install playwright
        run: |
          # 如果你的仓库里已经有 package.json，这里直接 npm install 也可以
          npm init -y
          npm install playwright
          npx playwright install chromium

      # =========================
      # 🟡 5️⃣ 下载并解压 Buster 插件
      # =========================
      - name: Download and Unzip Buster
        run: |
          mkdir -p extensions/buster
          wget -O extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked

          echo "📦 Buster 解压完成"

      # =========================
      # 🟡 6️⃣ 运行核心续期脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      # =========================
      # 🟡 7️⃣ 上传运行截图
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn

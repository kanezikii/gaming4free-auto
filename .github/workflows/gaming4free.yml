name: gaming4free renew (WARP + Python)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 每小时抽卡一次

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 🟡 1️⃣ 启动 WARP 客户端模式 (SOCKS5)
      # =========================
      - name: Setup WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client # 🌟 核心保命符：必须加上，否则 Github 会断网失联！

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python packages
        run: |
          pip install seleniumbase SpeechRecognition pydub
          sbase install chromium

      # =========================
      # 🟡 2️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          
          echo "⏳ 等待 WARP 隧道建立 (等待10秒)..."
          sleep 10
          
          echo "🌍 验证 WARP SOCKS5 代理 IP:"
          curl -s -x socks5://127.0.0.1:40000 https://api.ipify.org
          echo ""
          
          xvfb-run -a python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn

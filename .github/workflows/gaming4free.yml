name: gaming4free renew (Xray)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 🕕 每天18:00（UTC）

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

     # =========================
      # 🟡 1️⃣ 下载并运行 Xray 专属代理
      # =========================
      - name: Setup Xray Proxy
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          mkdir -p xray-core
          cd xray-core
          
          # 下载官方 Xray
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.9/Xray-linux-64.zip
          unzip -q xray.zip
          chmod +x xray
          
          # 写入配置文件
          echo "$XRAY_CONFIG" > config.json
          
          # 🌟 修复：使用标准的 run 指令后台启动
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          # 等待 3 秒
          sleep 3
          
          # 🌟 修复：开启天眼，如果 Xray 进程不存在，直接打印报错日志！
          if ! pgrep -x "xray" > /dev/null; then
            echo "❌ 糟糕！Xray 启动闪退了，以下是死亡原因："
            cat xray.log
            exit 1
          fi
          
          echo "✅ Xray 进程在后台运行正常！"
          echo "🌍 本机直连 IP:"
          curl -s https://api.ipify.org || echo "直连查询失败"
          echo -e "\n\n🚀 Xray 代理后 IP:"
          curl -s -x socks5://127.0.0.1:10808 https://api.ipify.org || echo "代理查询失败"
          echo ""

      # =========================
      # 🟡 2️⃣ 系统依赖（音频）
      # =========================
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full \
            pulseaudio alsa-utils ffmpeg

          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      # =========================
      # 🟡 3️⃣ 安装 Playwright
      # =========================
      - name: Install playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      # =========================
      # 🟡 4️⃣ 下载 Buster
      # =========================
      - name: Download and Unzip Buster
        run: |
          mkdir -p extensions/buster
          wget -qO extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked > /dev/null

      # =========================
      # 🟡 5️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      # =========================
      # 🟡 6️⃣ 上传截图
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn

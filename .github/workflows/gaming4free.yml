name: gaming4free renew (WARP + Python)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 每小时运行一次，增加“抽卡”机会

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 🟡 1️⃣ 启动 WARP 动态 IP 代理
      # =========================
      - name: Setup WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client # 默认开启 socks5://127.0.0.1:40000

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python packages
        run: |
          pip install seleniumbase SpeechRecognition pydub
          sbase install chromium

      # =========================
      # 🟡 2️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          # 验证 WARP 是否生效
          echo "🌍 当前出口 IP:"
          curl -s -x socks5://127.0.0.1:40000 https://api.ipify.org
          echo ""
          xvfb-run -a python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**

name: Gaming4Free Auto Renew (Ultimate)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 每小时抽卡一次

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: Setup Proxy Tunnel (Sing-box)
        env:
          PROXY_JSON: ${{ secrets.PROXY_JSON }}
        run: |
          wget https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-linux-amd64.tar.gz
          tar -xvf sing-box-1.9.0-linux-amd64.tar.gz
          sudo cp sing-box-1.9.0-linux-amd64/sing-box /usr/local/bin/
          
          echo "$PROXY_JSON" > config.json
          
          python -c "
          import json
          try:
              with open('config.json', 'r', encoding='utf-8') as f: data = json.load(f)
              if 'experimental' in data: del data['experimental']
              if 'dns' in data: del data['dns']
              if 'route' in data: del data['route']
              with open('config.json', 'w', encoding='utf-8') as f: json.dump(data, f)
          except Exception as e:
              print('JSON 修复失败:', e)
          "
          
          nohup sing-box run -c config.json > proxy.log 2>&1 &
          sleep 5
          curl -x socks5h://127.0.0.1:10808 https://ifconfig.me || echo "代理连接测试失败，但继续运行"

      - name: Run Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 🌟 使用 -a 参数自动分配最佳的虚拟显示器编号，完美触发 SeleniumBase 的破盾模块
          xvfb-run -a python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn

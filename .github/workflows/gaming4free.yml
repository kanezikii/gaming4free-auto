name: gaming4free renew (WARP + Python)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 每小时抽卡一次

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install seleniumbase

      - name: Start Sing-box Proxy Node
        env:
          PROXY_JSON: ${{ secrets.PROXY_JSON }}
        run: |
          # 1. 下载 sing-box 内核
          wget https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-linux-amd64.tar.gz
          tar -xvf sing-box-1.9.0-linux-amd64.tar.gz
          sudo cp sing-box-1.9.0-linux-amd64/sing-box /usr/local/bin/
          
          # 2. 将 Secret 写入 config.json
          echo "$PROXY_JSON" > config.json

          python -c "
          import json
          with open('config.json', 'r') as f: data = json.load(f)
          if 'route' in data and 'rule_set' in data['route']:
              data['route']['rule_set'] = []
          with open('config.json', 'w') as f: json.dump(data, f)
          "
          
          # 3. 后台启动代理客户端
          nohup sing-box run -c config.json > proxy.log 2>&1 &
          
          # 4. 等待代理启动并验证
          sleep 5
          curl -x socks5h://127.0.0.1:10808 https://ifconfig.me || echo "代理连接测试失败，但继续运行"
      # 👆 --------------------------------- 👆

      - name: Run script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 虚拟桌面运行 Python
          xvfb-run python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn

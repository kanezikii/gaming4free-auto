name: gaming4free renew (Xray)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 🕕 每天18:00（UTC）

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

     # =========================
      # 🟡 1️⃣ 下载并运行 Xray 专属代理
      # =========================
      - name: Setup Xray Proxy
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          mkdir -p xray-core
          cd xray-core
          
          # 下载官方 Xray
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.9/Xray-linux-64.zip
          unzip -q xray.zip
          chmod +x xray
          
          # 写入配置文件
          echo "$XRAY_CONFIG" > config.json
          
          # 🌟 修复：使用标准的 run 指令后台启动
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          # 等待 3 秒
          sleep 3
          
          # 🌟 修复：开启天眼，如果 Xray 进程不存在，直接打印报错日志！
          if ! pgrep -x "xray" > /dev/null; then
            echo "❌ 糟糕！Xray 启动闪退了，以下是死亡原因："
            cat xray.log
            exit 1
          fi
          
          echo "✅ Xray 进程在后台运行正常！"
          echo "🌍 本机直连 IP:"
          curl -s https://api.ipify.org || echo "直连查询失败"
          echo -e "\n\n🚀 Xray 代理后 IP:"
          curl -s -x socks5://127.0.0.1:10808 https://api.ipify.org || echo "代理查询失败"
          echo ""

      # 🟡 2️⃣ 系统依赖（提供底层虚拟屏幕与 ffmpeg 音频内核）
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full ffmpeg

      # =========================
      # 🟡 3️⃣ 配置 Python & SeleniumBase 核心环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase SpeechRecognition pydub
          # 下载 SeleniumBase 专属的无头浏览器
          sbase install chromium

      # =========================
      # 🟡 4️⃣ 运行终极续期脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          # 启动虚拟桌面并运行 Python 脚本
          xvfb-run -a python renew.py
          
      # =========================
      # 🟡 5️⃣ 上传截图
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn
